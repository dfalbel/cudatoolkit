name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Source-only tarballs. Libraries are downloaded from PyPI at install time
# by the configure script.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: [cuda12.6, cuda12.8]
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Get package version
        id: parse
        run: |
          version=$(grep "^Version:" ${{ matrix.package }}/DESCRIPTION | sed 's/Version:[[:space:]]*//')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check if release asset already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ steps.parse.outputs.version }}"
          ASSET="${{ matrix.package }}_${{ steps.parse.outputs.version }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source tarball
        if: steps.check.outputs.exists == 'false'
        run: R CMD build ${{ matrix.package }} --no-build-vignettes

      - name: Upload to GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${{ matrix.package }}"
          VER="${{ steps.parse.outputs.version }}"
          TAG="${PKG}-${VER}"
          ASSET="${PKG}_${VER}.tar.gz"
          gh release create "$TAG" \
            --title "${PKG} ${VER}" \
            --notes "${PKG} ${VER} — CUDA toolkit libraries for R. Libraries are downloaded from PyPI during installation." \
            2>/dev/null || true
          gh release upload "$TAG" "$ASSET" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ steps.parse.outputs.version }}
          path: "${{ matrix.package }}_${{ steps.parse.outputs.version }}.tar.gz"

  update-repo-index:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: r-lib/actions/setup-r@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate PACKAGES index
        run: |
          mkdir -p repo/src/contrib
          for f in artifacts/*/*.tar.gz; do
            [ -f "$f" ] || continue
            cp "$f" "repo/src/contrib/"
          done
          Rscript -e "tools::write_PACKAGES('repo/src/contrib', type = 'source', latestOnly = FALSE)"
          rm -f repo/src/contrib/*.tar.gz

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
