name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Release tag format: {package}-{version}
# e.g. cuda.runtime-12.9.79
# Asset naming: {package}_{version}_{platform}.tar.gz
# Platforms: linux-x64, linux-arm64, windows-x64

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: [cuda.runtime]
        cuda_version:
          - "12.6.77"
          - "12.8.90"
          - "12.9.79"
        platform: [linux-x64, linux-arm64, windows-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Check if release asset already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ matrix.cuda_version }}"
          ASSET="${{ matrix.package }}_${{ matrix.cuda_version }}_${{ matrix.platform }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check.outputs.exists == 'false'

      - name: Set CUDA version in DESCRIPTION
        if: steps.check.outputs.exists == 'false'
        run: |
          sed -i "s/^Version:.*/Version: ${{ matrix.cuda_version }}/" ${{ matrix.package }}/DESCRIPTION

      - name: Run configure to download CUDA libs
        if: steps.check.outputs.exists == 'false'
        working-directory: ${{ matrix.package }}
        env:
          CUDA_PLATFORM: ${{ matrix.platform }}
        run: ./configure

      - name: Remove configure and build fat source tarball
        if: steps.check.outputs.exists == 'false'
        run: |
          rm ${{ matrix.package }}/configure
          R CMD build ${{ matrix.package }}
          # Rename with platform suffix
          mv ${{ matrix.package }}_${{ matrix.cuda_version }}.tar.gz \
             ${{ matrix.package }}_${{ matrix.cuda_version }}_${{ matrix.platform }}.tar.gz

      - name: Upload to GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ matrix.cuda_version }}"
          ASSET="${{ matrix.package }}_${{ matrix.cuda_version }}_${{ matrix.platform }}.tar.gz"
          # Create release if it doesn't exist yet
          gh release create "$TAG" \
            --title "${{ matrix.package }} ${{ matrix.cuda_version }}" \
            --notes "CUDA ${{ matrix.cuda_version }} runtime libraries for R." \
            2>/dev/null || true
          gh release upload "$TAG" "$ASSET" --clobber

      - name: Download asset from existing release
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ matrix.cuda_version }}"
          ASSET="${{ matrix.package }}_${{ matrix.cuda_version }}_${{ matrix.platform }}.tar.gz"
          gh release download "$TAG" --pattern "$ASSET"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.cuda_version }}-${{ matrix.platform }}
          path: "${{ matrix.package }}_${{ matrix.cuda_version }}_${{ matrix.platform }}.tar.gz"

  update-repo-index:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: r-lib/actions/setup-r@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate PACKAGES indices per platform
        run: |
          for platform in linux-x64 linux-arm64 windows-x64; do
            mkdir -p "repo/${platform}/src/contrib"

            # Collect tarballs for this platform, renaming back to standard R name
            for f in artifacts/*-${platform}/*.tar.gz; do
              # cuda.runtime_12.9.79_linux.tar.gz -> cuda.runtime_12.9.79.tar.gz
              basename=$(basename "$f" | sed "s/_${platform}\.tar\.gz/.tar.gz/")
              cp "$f" "repo/${platform}/src/contrib/${basename}"
            done

            Rscript -e "tools::write_PACKAGES('repo/${platform}/src/contrib', type = 'source')"
            rm repo/${platform}/src/contrib/*.tar.gz
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
