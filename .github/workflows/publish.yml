name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Release tag format: {package}-{version}
# e.g. cuda.runtime-12.9.79
# Asset URL: /releases/download/cuda.runtime-12.9.79/cuda.runtime_12.9.79.tar.gz

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: [cuda.runtime]
        cuda_version:
          - "12.6.77"
          - "12.8.90"
          - "12.9.79"
    steps:
      - uses: actions/checkout@v4

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ matrix.cuda_version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check.outputs.exists == 'false'

      - name: Set CUDA version in DESCRIPTION
        if: steps.check.outputs.exists == 'false'
        run: |
          sed -i "s/^Version:.*/Version: ${{ matrix.cuda_version }}/" ${{ matrix.package }}/DESCRIPTION

      - name: Build source tarball
        if: steps.check.outputs.exists == 'false'
        run: R CMD build ${{ matrix.package }}

      - name: Build binary package
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p binary
          R CMD INSTALL --build --library=binary ${{ matrix.package }}_${{ matrix.cuda_version }}.tar.gz

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ matrix.cuda_version }}"
          gh release create "$TAG" \
            --title "${{ matrix.package }} ${{ matrix.cuda_version }}" \
            --notes "CUDA ${{ matrix.cuda_version }} runtime libraries for R." \
            ${{ matrix.package }}_${{ matrix.cuda_version }}.tar.gz \
            ${{ matrix.package }}_${{ matrix.cuda_version }}_R_*.tar.gz

      - name: Download source tarball from existing release
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ matrix.cuda_version }}"
          gh release download "$TAG" --pattern "${{ matrix.package }}_${{ matrix.cuda_version }}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.cuda_version }}-source
          path: "${{ matrix.package }}_${{ matrix.cuda_version }}.tar.gz"

  update-repo-index:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: r-lib/actions/setup-r@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate PACKAGES index
        run: |
          mkdir -p repo/src/contrib

          # Collect all source tarballs to generate the index
          find artifacts -name '*.tar.gz' -exec cp {} repo/src/contrib/ \;

          # Generate PACKAGES index
          Rscript -e 'tools::write_PACKAGES("repo/src/contrib", type = "source")'

          # Remove tarballs - only the index is deployed to gh-pages
          rm repo/src/contrib/*.tar.gz

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
