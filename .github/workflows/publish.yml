name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Source-only tarballs generated from the cuda/ template.
# Libraries are downloaded from PyPI at install time by the configure script.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_minor: "12.6"
            toolkit_version: "12.6.3"
            pkg_version: "1.0.0"
            cudnn_version: "9.5.0.50"
            nccl_version: "2.23.4"
            nvshmem_version: "3.1.7"
          - cuda_minor: "12.8"
            toolkit_version: "12.8.1"
            pkg_version: "1.0.0"
            cudnn_version: "9.8.0.87"
            nccl_version: "2.26.5"
            nvshmem_version: "3.4.5"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="cuda${{ matrix.cuda_minor }}-${{ matrix.pkg_version }}"
          ASSET="cuda${{ matrix.cuda_minor }}_${{ matrix.pkg_version }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate package from template
        if: steps.check.outputs.exists == 'false'
        run: |
          PKG="cuda${{ matrix.cuda_minor }}"
          cp -r cuda "$PKG"

          # Generate DESCRIPTION from template
          sed -e 's/{{CUDA_MINOR}}/${{ matrix.cuda_minor }}/g' \
              -e 's/{{PKG_VERSION}}/${{ matrix.pkg_version }}/g' \
              cuda/DESCRIPTION.template > "${PKG}/DESCRIPTION"
          rm "${PKG}/DESCRIPTION.template"

          # Write toolkit version
          mkdir -p "${PKG}/inst"
          echo "${{ matrix.toolkit_version }}" > "${PKG}/inst/cuda-toolkit-version"

          # Write extra components (cudnn, nccl, nvshmem)
          printf 'component\tpypi_package\tversion\twheel_subdir\textract\tlinux_only\n' > "${PKG}/inst/extra-components.tsv"
          printf 'cudnn\tnvidia_cudnn_cu12\t${{ matrix.cudnn_version }}\tcudnn\tlib,include\tno\n' >> "${PKG}/inst/extra-components.tsv"
          printf 'nccl\tnvidia_nccl_cu12\t${{ matrix.nccl_version }}\tnccl\tlib,include\tyes\n' >> "${PKG}/inst/extra-components.tsv"
          printf 'nvshmem\tnvidia_nvshmem_cu12\t${{ matrix.nvshmem_version }}\tnvshmem\tlib,include\tyes\n' >> "${PKG}/inst/extra-components.tsv"

      - name: Build source tarball
        if: steps.check.outputs.exists == 'false'
        run: |
          PKG="cuda${{ matrix.cuda_minor }}"
          R CMD build "$PKG" --no-build-vignettes

      - name: Upload to GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="cuda${{ matrix.cuda_minor }}"
          VER="${{ matrix.pkg_version }}"
          TAG="${PKG}-${VER}"
          ASSET="${PKG}_${VER}.tar.gz"
          gh release create "$TAG" \
            --title "${PKG} ${VER}" \
            --notes "${PKG} ${VER} — CUDA ${{ matrix.cuda_minor }} toolkit libraries for R (toolkit ${{ matrix.toolkit_version }}). Libraries are downloaded from PyPI during installation." \
            2>/dev/null || true
          gh release upload "$TAG" "$ASSET" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: cuda${{ matrix.cuda_minor }}-${{ matrix.pkg_version }}
          path: "cuda${{ matrix.cuda_minor }}_${{ matrix.pkg_version }}.tar.gz"

  update-repo-index:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: r-lib/actions/setup-r@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate PACKAGES index
        run: |
          mkdir -p repo/src/contrib
          for f in artifacts/*/*.tar.gz; do
            [ -f "$f" ] || continue
            cp "$f" "repo/src/contrib/"
          done
          Rscript -e "tools::write_PACKAGES('repo/src/contrib', type = 'source', latestOnly = FALSE)"
          rm -f repo/src/contrib/*.tar.gz

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
