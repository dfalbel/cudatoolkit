name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Source-only tarballs generated from the cuda/ template.
# Libraries are downloaded from PyPI at install time by the configure script.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_minor: "12.6"
            cuda_major: "12"
            toolkit_version: "12.6.3"
            pkg_version: "1.0.0"
            cudnn_version: "9.5.0.50"
            nccl_version: "2.23.4"
            nvshmem_version: "3.1.7"
          - cuda_minor: "12.8"
            cuda_major: "12"
            toolkit_version: "12.8.1"
            pkg_version: "1.0.1"
            cudnn_version: "9.8.0.87"
            nccl_version: "2.29.7"
            nvshmem_version: "3.4.5"
          - cuda_minor: "13.2"
            cuda_major: "13"
            toolkit_version: "13.2.0"
            pkg_version: "1.0.0"
            cudnn_version: "9.20.0.48"
            nccl_version: "2.29.7"
            nvshmem_version: "3.6.5"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="cuda${{ matrix.cuda_minor }}-${{ matrix.pkg_version }}"
          ASSET="cuda${{ matrix.cuda_minor }}_${{ matrix.pkg_version }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate package from template
        if: steps.check.outputs.exists == 'false'
        run: |
          PKG="cuda${{ matrix.cuda_minor }}"
          cp -r cuda "$PKG"

          # Generate DESCRIPTION from template
          sed -e 's/{{CUDA_MINOR}}/${{ matrix.cuda_minor }}/g' \
              -e 's/{{PKG_VERSION}}/${{ matrix.pkg_version }}/g' \
              cuda/DESCRIPTION.template > "${PKG}/DESCRIPTION"
          rm "${PKG}/DESCRIPTION.template"

          mkdir -p "${PKG}/inst"
          CUDA_MAJOR="${{ matrix.cuda_major }}"

          # Resolve and pin component versions from cuda-toolkit on PyPI
          curl -sL "https://pypi.org/pypi/cuda-toolkit/${{ matrix.toolkit_version }}/json" -o /tmp/toolkit.json
          printf 'component\tpypi_package\tversion\twheel_subdir\textract\tlinux_only\n' > "${PKG}/inst/components.tsv"

          # CUDA 12: packages have _cu12 suffix, each component has its own wheel subdir
          # CUDA 13+: packages have no cu suffix, all components share nvidia/cu{major}/ subdir
          if [ "$CUDA_MAJOR" = "12" ]; then
            PYPI_SUFFIX="_cu12"
            TOOLKIT_COMPONENTS="
            runtime   nvidia_cuda_runtime${PYPI_SUFFIX}  cuda_runtime  lib,include no
            cublas    nvidia_cublas${PYPI_SUFFIX}         cublas         lib,include no
            cupti     nvidia_cuda_cupti${PYPI_SUFFIX}     cuda_cupti     lib,include no
            nvrtc     nvidia_cuda_nvrtc${PYPI_SUFFIX}     cuda_nvrtc     lib,include no
            cufft     nvidia_cufft${PYPI_SUFFIX}          cufft          lib,include no
            cusolver  nvidia_cusolver${PYPI_SUFFIX}       cusolver       lib,include no
            cusparse  nvidia_cusparse${PYPI_SUFFIX}       cusparse       lib,include no
            nvjitlink nvidia_nvjitlink${PYPI_SUFFIX}      nvjitlink      lib,include no
            nvcc      nvidia_cuda_nvcc${PYPI_SUFFIX}      cuda_nvcc      bin,include no
            "
            CUDNN_PKG="nvidia_cudnn${PYPI_SUFFIX}"
            NCCL_PKG="nvidia_nccl${PYPI_SUFFIX}"
            NVSHMEM_PKG="nvidia_nvshmem${PYPI_SUFFIX}"
            CUDNN_SUBDIR="cudnn"
            NCCL_SUBDIR="nccl"
            NVSHMEM_SUBDIR="nvshmem"
          else
            PYPI_SUFFIX=""
            WHEEL_SUBDIR="cu${CUDA_MAJOR}"
            TOOLKIT_COMPONENTS="
            runtime   nvidia_cuda_runtime      ${WHEEL_SUBDIR}  lib,include no
            cublas    nvidia_cublas             ${WHEEL_SUBDIR}  lib,include no
            cupti     nvidia_cuda_cupti         ${WHEEL_SUBDIR}  lib,include no
            nvrtc     nvidia_cuda_nvrtc         ${WHEEL_SUBDIR}  lib,include no
            cufft     nvidia_cufft              ${WHEEL_SUBDIR}  lib,include no
            cusolver  nvidia_cusolver           ${WHEEL_SUBDIR}  lib,include no
            cusparse  nvidia_cusparse           ${WHEEL_SUBDIR}  lib,include no
            nvjitlink nvidia_nvjitlink          ${WHEEL_SUBDIR}  lib,include no
            nvcc      nvidia_cuda_nvcc          ${WHEEL_SUBDIR}  bin,include no
            "
            CUDNN_PKG="nvidia_cudnn_cu${CUDA_MAJOR}"
            NCCL_PKG="nvidia_nccl_cu${CUDA_MAJOR}"
            NVSHMEM_PKG="nvidia_nvshmem_cu${CUDA_MAJOR}"
            CUDNN_SUBDIR="${WHEEL_SUBDIR}"
            NCCL_SUBDIR="${WHEEL_SUBDIR}"
            NVSHMEM_SUBDIR="${WHEEL_SUBDIR}"
          fi

          # Extract pinned versions from cuda-toolkit metadata
          # Matches both nvidia-foo-cu12==ver.* and nvidia-foo==ver.*
          grep -oE 'nvidia-[a-z-]+(|-cu[0-9]+)==[0-9.]+\.\*' /tmp/toolkit.json \
            | sed 's/\.\*$//' \
            | sed 's/-/_/g' \
            | sed 's/==/=/' \
            | sort -u > /tmp/versions.txt
          echo "Resolved versions:"
          cat /tmp/versions.txt

          echo "$TOOLKIT_COMPONENTS" | while read -r comp pkg subdir extract linux_only; do
            [ -z "$comp" ] && continue
            ver=$(grep "^${pkg}=" /tmp/versions.txt | head -1 | cut -d= -f2)
            if [ -n "$ver" ]; then
              printf '%s\t%s\t%s\t%s\t%s\t%s\n' "$comp" "$pkg" "$ver" "$subdir" "$extract" "$linux_only" >> "${PKG}/inst/components.tsv"
            fi
          done

          # Append extra components not in cuda-toolkit (cudnn, nccl, nvshmem)
          printf '%s\t%s\t%s\t%s\t%s\t%s\n' "cudnn" "$CUDNN_PKG" "${{ matrix.cudnn_version }}" "$CUDNN_SUBDIR" "lib,include" "no" >> "${PKG}/inst/components.tsv"
          printf '%s\t%s\t%s\t%s\t%s\t%s\n' "nccl" "$NCCL_PKG" "${{ matrix.nccl_version }}" "$NCCL_SUBDIR" "lib,include" "yes" >> "${PKG}/inst/components.tsv"
          printf '%s\t%s\t%s\t%s\t%s\t%s\n' "nvshmem" "$NVSHMEM_PKG" "${{ matrix.nvshmem_version }}" "$NVSHMEM_SUBDIR" "lib,include" "yes" >> "${PKG}/inst/components.tsv"

          echo "Pinned components:"
          cat "${PKG}/inst/components.tsv"

      - name: Build source tarball
        if: steps.check.outputs.exists == 'false'
        run: |
          PKG="cuda${{ matrix.cuda_minor }}"
          R CMD build "$PKG" --no-build-vignettes

      - name: Upload to GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="cuda${{ matrix.cuda_minor }}"
          VER="${{ matrix.pkg_version }}"
          TAG="${PKG}-${VER}"
          ASSET="${PKG}_${VER}.tar.gz"
          gh release create "$TAG" \
            --title "${PKG} ${VER}" \
            --notes "${PKG} ${VER} — CUDA ${{ matrix.cuda_minor }} toolkit libraries for R (toolkit ${{ matrix.toolkit_version }}). Libraries are downloaded from PyPI during installation." \
            2>/dev/null || true
          gh release upload "$TAG" "$ASSET" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: cuda${{ matrix.cuda_minor }}-${{ matrix.pkg_version }}
          path: "cuda${{ matrix.cuda_minor }}_${{ matrix.pkg_version }}.tar.gz"

  update-repo-index:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: r-lib/actions/setup-r@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate PACKAGES index
        run: |
          mkdir -p repo/src/contrib
          for f in artifacts/*/*.tar.gz; do
            [ -f "$f" ] || continue
            cp "$f" "repo/src/contrib/"
          done
          Rscript -e "tools::write_PACKAGES('repo/src/contrib', type = 'source', latestOnly = FALSE)"
          rm -f repo/src/contrib/*.tar.gz

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
