name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Release tag format: {package}-{version}
# e.g. cuda12.8-1.0.0
# Asset naming: {package}_{version}_{platform}.tar.gz

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux-x64, linux-arm64, windows-x64]
        package: [cuda12.6, cuda12.8]
    steps:
      - uses: actions/checkout@v4

      - name: Get package version
        id: parse
        run: |
          version=$(grep "^Version:" ${{ matrix.package }}/DESCRIPTION | sed 's/Version:[[:space:]]*//')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check if release asset already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ steps.parse.outputs.version }}"
          ASSET="${{ matrix.package }}_${{ steps.parse.outputs.version }}_${{ matrix.platform }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check.outputs.exists == 'false'

      - name: Run configure to download libs
        if: steps.check.outputs.exists == 'false'
        working-directory: ${{ matrix.package }}
        env:
          CUDA_PLATFORM: ${{ matrix.platform }}
        run: ./configure

      - name: Remove configure and build fat source tarball
        if: steps.check.outputs.exists == 'false'
        run: |
          PKG="${{ matrix.package }}"
          VER="${{ steps.parse.outputs.version }}"
          rm "${PKG}/configure"
          R CMD build "$PKG" --no-build-vignettes
          mv "${PKG}_${VER}.tar.gz" "${PKG}_${VER}_${{ matrix.platform }}.tar.gz"

      - name: Upload to GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${{ matrix.package }}"
          VER="${{ steps.parse.outputs.version }}"
          TAG="${PKG}-${VER}"
          ASSET="${PKG}_${VER}_${{ matrix.platform }}.tar.gz"
          gh release create "$TAG" \
            --title "${PKG} ${VER}" \
            --notes "${PKG} ${VER} — CUDA toolkit libraries for R." \
            2>/dev/null || true
          gh release upload "$TAG" "$ASSET" --clobber

      - name: Download asset from existing release
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ matrix.package }}-${{ steps.parse.outputs.version }}"
          ASSET="${{ matrix.package }}_${{ steps.parse.outputs.version }}_${{ matrix.platform }}.tar.gz"
          gh release download "$TAG" --pattern "$ASSET"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ steps.parse.outputs.version }}-${{ matrix.platform }}
          path: "${{ matrix.package }}_${{ steps.parse.outputs.version }}_${{ matrix.platform }}.tar.gz"

  update-repo-index:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: r-lib/actions/setup-r@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate PACKAGES indices per platform
        run: |
          for platform in linux-x64 linux-arm64 windows-x64; do
            mkdir -p "repo/${platform}/src/contrib"

            # Collect tarballs for this platform, renaming back to standard R name
            for f in artifacts/*-${platform}/*.tar.gz; do
              [ -f "$f" ] || continue
              basename=$(basename "$f" | sed "s/_${platform}\.tar\.gz/.tar.gz/")
              cp "$f" "repo/${platform}/src/contrib/${basename}"
            done

            Rscript -e "tools::write_PACKAGES('repo/${platform}/src/contrib', type = 'source', latestOnly = FALSE)"
            rm -f repo/${platform}/src/contrib/*.tar.gz
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
